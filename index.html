<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <!-- SVG を優先（ベクター） -->
   <link rel="icon" href="/ICON.svg?v=2" type="image/svg+xml" sizes="any">
  
  <!-- 古いブラウザ用フォールバック -->
  <link rel="icon" href="/favicon.ico?v=2" sizes="32x32">

  <!-- iOS ホーム画面用（PNG） -->

  <!-- Safari pinned tab（単色アイコン用） -->

  <!-- Web App Manifest（必要なら） -->

  <title>Okubo Craft - Ultimate Perfect Fix Edition</title>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #87CEEB; font-family: 'Helvetica Neue', Arial, sans-serif; user-select: none; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 24px; z-index: 10; pointer-events: none; opacity: 0.9; text-shadow: 0 0 4px #000; }
        
        #info { position: absolute; top: 20px; left: 20px; z-index: 10; color: #fff; background: rgba(0, 0, 0, 0.85); padding: 18px; border-radius: 10px; pointer-events: none; font-size: 13px; border: 2px solid #55ff55; box-shadow: 0 4px 15px rgba(0,255,0,0.3); max-width: 300px; }
        .key { color: #55ff55; font-weight: bold; }

        /* 📁 MOD管理パネル（Mキー対応・3段階トグル） */
        #mod-panel { position: absolute; top: 20px; right: 20px; z-index: 105; background: rgba(20, 20, 20, 0.95); border: 2px dashed #00ffcc; padding: 15px; border-radius: 8px; color: #fff; font-size: 12px; transition: all 0.2s ease; width: 280px; box-shadow: 0 0 15px rgba(0,255,200,0.4); }
        #mod-panel.size-normal { width: 280px; font-size: 12px; height: auto; }
        #mod-panel.size-large { width: 600px; font-size: 15px; top: 5%; right: 5%; height: 80%; overflow-y: auto; border: 3px solid #00ffcc; }
        #mod-file-input { margin-top: 10px; color: #00ffcc; width: 100%; cursor: pointer; }
        #loaded-mods-list { margin-top: 8px; font-size: 11px; color: #aaa; padding-left: 15px; }

        #toast-container { position: absolute; top: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: rgba(20, 20, 20, 0.95); border: 3px solid #f9aa33; border-radius: 6px; padding: 12px; color: #fff; width: 280px; display: flex; flex-direction: column; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .toast.mod-toast { border-color: #00ffcc; }
        .toast-title { color: #f9aa33; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .toast.mod-toast .toast-title { color: #00ffcc; }
        .toast-name { font-size: 14px; font-weight: bold; margin-top: 2px; }
        
        #advancement-screen { position: absolute; top: 10%; left: 15%; width: 70%; height: 80%; background: rgba(16, 16, 16, 0.95); border: 4px solid #444; border-radius: 8px; z-index: 50; display: none; color: #fff; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #advancement-screen h2 { margin-top: 0; color: #f9aa33; border-bottom: 2px solid #444; padding-bottom: 10px; text-align: center; }
        .adv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-top: 15px; }
        .adv-card { background: rgba(40,40,40,0.8); border: 2px solid #555; border-radius: 5px; padding: 12px; transition: all 0.2s; }
        .adv-card.done { border-color: #55ff55; background: rgba(20, 50, 20, 0.6); }
        .adv-card.mod-card { border-color: #00e5ff; }
        .adv-card.mod-card.done { border-color: #00ffcc; background: rgba(20, 50, 50, 0.6); }
        .adv-header { font-weight: bold; font-size: 13px; color: #aaa; }
        .adv-card.done .adv-header { color: #55ff55; }
        .adv-card.mod-card.done .adv-header { color: #00ffcc; }
        .adv-desc { font-size: 11px; color: #bbb; margin-top: 4px; }

        #hud { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        #hearts { display: flex; gap: 4px; margin-bottom: 8px; font-size: 28px; }
        .heart { color: #ff2255; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .heart.empty { color: #333; }
        #hotbar { display: flex; background: rgba(20, 20, 20, 0.95); border: 4px solid #444; border-radius: 4px; padding: 4px; gap: 6px; }
        .slot { width: 54px; height: 54px; border: 2px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #ccc; font-size: 10px; font-weight: bold; background: rgba(0,0,0,0.6); }
        .slot.active { border-color: #55ff55; color: #fff; background: rgba(85, 255, 85, 0.25); box-shadow: inset 0 0 8px #55ff55; }
        .block-preview { width: 22px; height: 22px; border-radius: 2px; margin-bottom: 3px; }

        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="crosshair">+</div>
    <div id="toast-container"></div>



    <div id="advancement-screen">
        <h2>🏆 進捗・拡張実績一覧 (Cキー)</h2>
        <div class="adv-grid" id="adv-grid"></div>
    </div>

    <canvas id="glCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
/**
 * ========================================================================
 * 👑 真・Okubo Craft Ultimate Matrix (2026 Refined Engine) - Part 1/2
 * ========================================================================
 * 精査内容：
 * 1. タイポ修正 ➡️ Worker内の「0x9e9e grey」を「0x9e9e9e」へ完全修正
 * 2. 複数MOD同時選択 ➡️ <input type="file" multiple> による一括アドオン注入対応
 * 3. 拡張APIの超増大 ➡️ 怒涛の150個へ大拡充（前半：1〜75を完全実装）
 * ※ このコードの末尾に、続けて出力される「後半（Part 2）」を結合してください。
 */

(function() {
    'use strict';

    // ==========================================
    // ⚙️ 1. ハイパーゲームステート & インフラ構造体
    // ==========================================
    window.playerSpeed = 0.22;
    window.jumpPower = 0.44;
    window.gravity = 0.024;
    window.health = 20;
    window.maxHealth = 20;
    window.okuboKills = 0;
    window.selectedSlot = 0; 
    window.isDead = false;
    window.worldBlocks = new Map();
    window.chunkInstances = new Map();
    window.okubos = [];
    window.activeMods = [];       
    window.gameScore = 0;
    window.renderDistance = 5;    
    window.cubeSize = 2;
    window.chunkSize = 16;
    
    window.playerHeight = 3.2;
    window.playerRadius = 0.65;
    window.placementReach = 18;
    
    window.modMenuState = 0;      
    window.isSaveMenuOpen = false;
    window.isAdvOpen = false;
    window.isHudVisible = true;   
    
    window.currentBiomeName = "平穏な大久保プレインズ";
    window.biomePatternType = "standard"; 
    window.okuboSpeedMultiplier = 1.0;
    window.okubosFrozen = false;
    window.isFlightEnabled = false;

    // 🎒 15マスタースロットブロック
    window.blockRegistry = [
        { id: 0, name: "バイオーム草土", color: 0x4a7c59, type: "ground" },
        { id: 1, name: "深層岩盤ブロック", color: 0x5a5a60, type: "stone" },
        { id: 2, name: "大跳躍エナジー", color: 0xff007f, type: "jump" },
        { id: 3, name: "サイバーネオン", color: 0x00ffcc, type: "light" },
        { id: 4, name: "深紅の溶岩石", color: 0x7a2020, type: "lava" },
        { id: 5, name: "黄金の砂岩", color: 0xe3c16f, type: "sand" },
        { id: 6, name: "桜の聖木", color: 0xffb7c5, type: "wood" },
        { id: 7, name: "深淵の黒曜石", color: 0x111111, type: "stone_hard" },
        { id: 8, name: "天空の雲結晶", color: 0xe7f5dc, type: "glass" },
        { id: 9, name: "アメジスト原石", color: 0x7209b7, type: "crystal" },
        { id: 10, name: "プラズマコア", color: 0x3f51b5, type: "energy" },
        { id: 11, name: "古代の青銅", color: 0xd4af37, type: "metal" },
        { id: 12, name: "ルビーブロック", color: 0xe91e63, type: "gem" },
        { id: 13, name: "エンドエーテル", color: 0x9c27b0, type: "void" },
        { id: 14, name: "大久保の肉塊", color: 0xff0055, type: "mob" }
    ];

    window.hotbarInventory = [
        { ...window.blockRegistry[0] }, { ...window.blockRegistry[1] }, 
        { ...window.blockRegistry[2] }, { ...window.blockRegistry[3] }, 
        { ...window.blockRegistry[5] }, { ...window.blockRegistry[6] }, 
        { ...window.blockRegistry[9] }, { ...window.blockRegistry[12] },
        { id: 99, name: "伝説の大剣", color: 0x00ffcc, type: "weapon" } 
    ];

    window.advancements = [
        { id: "start", name: "🌍 地平線の目覚め", desc: "精査された大久保世界へ降り立った", done: false },
        { id: "kill_1", name: "⚔️ 討伐のファーストステップ", desc: "大久保を撃破した", done: false },
        { id: "kill_15", name: "🚨 異変の最高潮", desc: "大久保を15体討伐し、ボスの封印が解除された", done: false },
        { id: "boss_clear", name: "👑 次世代の支配者", desc: "ボス大久保を無力化した", done: false },
        { id: "mine_block", name: "⛏️ デストラクション", desc: "ブロックを破壊した", done: false },
        { id: "place_block", name: "🏗️ アーキテクト", desc: "ブロックを設置した", done: false },
        { id: "high_jump", name: "🚀 重力からの解放", desc: "エナジーブロックで超高跳躍を達成した", done: false },
        { id: "save_world", name: "💾 アーカイブ構築", desc: "世界のセーブを同期した", done: false },
        { id: "respawn", name: "😇 イモータル・ソウル", desc: "リスポーンによる帰還を果たした", done: false },
        { id: "file_load", name: "📂 複数因子の並列マウント", desc: "複数選択したアドオンのインジェクトに成功した", done: false }
    ];

    const toastContainer = document.createElement('div');
    toastContainer.style = 'position: absolute; top: 20px; right: 20px; z-index: 600; display: flex; flex-direction: column; gap: 10px; pointer-events: none; font-family: sans-serif;';
    document.body.appendChild(toastContainer);
// ==========================================
    // 🏆 進捗スタック＆順序スライド消去システム（完全版）
    // ==========================================
    let activeToasts = []; // 現在表示中のトーストを管理する配列

    window.showAdvancementToast = function(adv) {
        const toast = document.createElement('div');
        // 初期状態は画面外（translateX(140%)）かつ透明
        toast.style = 'background: rgba(5, 15, 10, 0.96); color: #fff; border: 2px solid #00ffcc; padding: 12px 20px; border-radius: 6px; box-shadow: 0 4px 25px rgba(0,0,0,0.6); transform: translateX(140%); opacity: 0; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); display: flex; flex-direction: column; min-width: 260px; pointer-events: auto;';
        toast.innerHTML = `
            <span style="color: #00ffcc; font-weight: bold; font-size: 10px; letter-spacing: 1px;">🏆 ADVANCEMENT UNLOCKED</span>
            <span style="font-size: 14px; font-weight: bold; margin-top: 2px; color: #fff; text-shadow: 0 0 5px rgba(0,255,200,0.5);">${adv.name}</span>
            <span style="font-size: 11px; color: #bbb; margin-top: 3px;">${adv.desc}</span>
        `;
        
        // コンテナに追加し、アクティブ配列に登録
        toastContainer.appendChild(toast);
        activeToasts.push(toast);
        
        // 画面内へ滑らかにスライドイン
        setTimeout(() => {
            toast.style.transform = 'translateX(0)';
            toast.style.opacity = '1';
        }, 30);

        // 表示開始からの生存タイマーを設定
        // 大量発生時は、配列内での「自分のインデックス」に応じて消えるタイミングを250msずつズラす
        const baseDisplayTime = 3000; // 最低表示時間（3秒）
        const myIndex = activeToasts.indexOf(toast);
        const totalDelay = baseDisplayTime + (myIndex * 250);

        setTimeout(() => {
            // 右へスライドアウトして消えるアニメーション
            toast.style.transform = 'translateX(140%)';
            toast.style.opacity = '0';
            
            // アニメーションが終わるのを待ってからDOMと配列から完全削除
            setTimeout(() => {
                toast.remove();
                activeToasts = activeToasts.filter(t => t !== toast);
            }, 400);
        }, totalDelay);
    };

    // ==========================================
    // 🛠️ 拡張デベロッパーAPI 1〜75 (超増大版 前半)
    // ==========================================
    window.api_1_teleport = function(x, y, z) { camera.position.set(x, y, z); };
    window.api_2_setBlock = function(x, y, z, id, color) { let col = color || window.blockRegistry[id]?.color || 0xffffff; const bx = Math.round(x/2)*2, by = Math.round(y/2)*2, bz = Math.round(z/2)*2; window.worldBlocks.set(`${bx},${by},${bz}`, { type: id, color: col }); window.forceRenderChunkAt(bx, bz); };
    window.api_3_breakBlock = function(x, y, z) { const bx = Math.round(x/2)*2, by = Math.round(y/2)*2, bz = Math.round(z/2)*2; if(window.worldBlocks.has(`${bx},${by},${bz}`)) { window.worldBlocks.delete(`${bx},${by},${bz}`); window.forceRenderChunkAt(bx, bz); return true; } return false; };
    window.api_4_fillArea = function(x1,y1,z1,x2,y2,z2,id,color) { for(let x=Math.min(x1,x2);x<=Math.max(x1,x2);x+=2){ for(let y=Math.min(y1,y2);y<=Math.max(y1,y2);y+=2){ for(let z=Math.min(z1,z2);z<=Math.max(z1,z2);z+=2){ window.api_2_setBlock(x,y,z,id,color); } } } };
    window.api_5_clearAllBlocks = function() { window.worldBlocks.clear(); window.chunkInstances.forEach(m => { if(Array.isArray(m)) m.forEach(mesh => scene.remove(mesh)); }); window.chunkInstances.clear(); };
    window.api_6_spawnOkubo = function(x,y,z,hp=6,isBoss=false,size=1.0) { window.spawnCustomOkubo(x,y,z,hp,isBoss,size); };
    window.api_7_clearAllOkubos = function() { okubos.forEach(o => scene.remove(o)); okubos.length = 0; };
    window.api_8_getNearbyOkubos = function(r=50) { return okubos.filter(o=>camera.position.distanceTo(o.position)<=r); };
    window.api_9_damageOkubo = function(idx, dmg) { if(okubos[idx]) okubos[idx].userData.hp -= dmg; };
    window.api_10_setPlayerSpeed = function(s) { window.playerSpeed = s; };
    window.api_11_setJumpPower = function(j) { window.jumpPower = j; };
    window.api_12_setGravity = function(g) { window.gravity = g; };
    window.api_13_healPlayer = function(h) { window.health = Math.min(window.maxHealth, window.health + h); };
    window.api_14_damagePlayer = function(d) { if(window.isDead) return; window.health -= d; if(window.health<=0) { window.health = 0; window.triggerDeathSystem(); } };
    window.api_15_addAdvancement = function(id, name, desc) { window.advancements.push({id, name, desc, done:false}); };
    window.api_16_triggerAdvancement = function(id) { const a = window.advancements.find(v=>v.id===id); if(a && !a.done) { a.done = true; window.showAdvancementToast(a); } };
    window.api_17_getOkuboCount = function() { return okubos.length; };
    window.api_18_setRenderDistance = function(d) { window.renderDistance = d; };
    window.api_19_getBlockAt = function(x,y,z) { return window.worldBlocks.get(`${Math.round(x/2)*2},${Math.round(y/2)*2},${Math.round(z/2)*2}`); };
    window.api_20_getPlayerPosition = function() { return {x: camera.position.x, y: camera.position.y, z: camera.position.z}; };
    window.api_21_setSkyColor = function(c) { scene.background.setHex(c); if(scene.fog) scene.fog.color.setHex(c); };
    window.api_22_addScore = function(s) { window.gameScore += s; };
    window.api_23_getScore = function() { return window.gameScore; };
    window.api_24_setSunIntensity = function(i) { sun.intensity = i; };
    window.api_25_setAmbientIntensity = function(i) { ambientLight.intensity = i; };
    window.api_26_explodeAt = function(cx,cy,cz,r=6) { for(let x=cx-r;x<=cx+r;x+=2){ for(let y=cy-r;y<=cy+r;y+=2){ for(let z=cz-r;z<=cz+r;z+=2){ if(new THREE.Vector3(x,y,z).distanceTo(new THREE.Vector3(cx,cy,cz))<=r) window.api_3_breakBlock(x,y,z); } } } };
    window.api_27_getLoadedChunksCount = function() { return window.chunkInstances.size; };
    window.api_28_setOkuboSpeedMultiplier = function(m) { window.okuboSpeedMultiplier = m; };
    window.api_29_setHotbarSlot = function(s) { if(s>=0 && s<=8) { window.selectedSlot = s; if(window.updateHotbarUI) window.updateHotbarUI(); } };
    window.api_30_getInventoryList = function() { return window.blockRegistry; };
    window.api_31_toggleFlight = function() { window.isFlightEnabled = !window.isFlightEnabled; };
    window.api_32_setPlayerMaxHealth = function(m) { window.maxHealth = m; window.health = m; };
    window.api_33_broadcastMessage = function(m) { console.log(`[Matrix Core] ${m}`); };
    window.api_34_resetAllAdvancements = function() { window.advancements.forEach(a=>a.done=false); };
    window.api_35_freezeOkubos = function() { window.okubosFrozen = !window.okubosFrozen; };
    window.api_36_getBiomeAt = function(x,z) { return window.currentBiomeName; };
    window.api_37_setFogDensity = function(d) { if(scene.fog) scene.fog.density = d; };
    window.api_38_setBiomePattern = function(type) { window.biomePatternType = type; window.api_5_clearAllBlocks(); if(window.loadChunks) window.loadChunks(); };
    window.api_39_spawnGiantStructure = function(cx, cy, cz, size=1) { for(let y=0; y<30*size; y+=2){ for(let x=-4*size; x<=4*size; x+=2){ window.api_2_setBlock(cx+x, cy+y, cz, 7, 0x111111); } } };
    window.api_40_massSpawnOkubo = function(count=10) { const p = window.api_20_getPlayerPosition(); for(let i=0;i<count;i++) window.api_6_spawnOkubo(p.x+(Math.random()-0.5)*40, p.y+15, p.z+(Math.random()-0.5)*45); };
    window.api_41_generateMadaraHelix = function(cx, cy, cz) { for(let i=0; i<50; i++) { let r = i*0.4; window.api_2_setBlock(cx+Math.sin(i)*r, cy+i, cz+Math.cos(i)*r, i%15); } };
    window.api_42_setAllOkuboHP = function(hp) { window.okubos.forEach(o => o.userData.hp = hp); };
    window.api_43_spawnPyramid = function(cx, cy, cz, h=8) { for(let y=0; y<h; y++) { let r = h-y; window.api_4_fillArea(cx-r*2, cy+y*2, cz-r*2, cx+r*2, cy+y*2, cz+r*2, 5); } };
    window.api_44_instantlyClearLoadedOkubos = function() { window.okubos.forEach(o=>scene.remove(o)); window.okubos = []; };
    window.api_45_getKillCount = function() { return window.okuboKills; };
    window.api_46_addMaxHealth = function(amt) { window.maxHealth += amt; window.health = window.maxHealth; };
    window.api_47_strikeLightning = function(x, z) { window.api_4_fillArea(x, 0, z, x, 80, z, 3, 0xffffff); setTimeout(() => { for(let y=0; y<80; y+=2) window.api_3_breakBlock(x,y,z); }, 120); };
    window.api_48_setBlockName = function(id, newName) { if(window.blockRegistry[id]) window.blockRegistry[id].name = newName; };
    window.api_49_getPlayerVelocity = function() { return velocity; };
    window.api_50_forceUnlockAllAdvancements = function() { window.advancements.forEach(a=>window.api_16_triggerAdvancement(a.id)); };
    window.api_51_createValleyFloor = function(cx, cz, w=15) { window.api_4_fillArea(cx-w, -6, cz-w, cx+w, -4, 1, 0x6c757d); };
    window.api_52_setBiomePatternType = function(t) { window.biomePatternType = t; window.api_5_clearAllBlocks(); loadChunks(); };
    window.api_53_getClosestOkuboDistance = function() { if(window.okubos.length===0) return -1; return camera.position.distanceTo(window.okubos[0].position); };
    window.api_54_healToMax = function() { window.health = window.maxHealth; };
    window.api_55_spawnMeatShield = function() { const p = window.api_20_getPlayerPosition(); window.api_4_fillArea(p.x-2, p.y, p.z-4, p.x+2, p.y+4, p.z-4, 14); };
    window.api_56_getLoadedBlockCount = function() { return window.worldBlocks.size; };
    window.api_57_damageAllNearbyOkubos = function(r, dmg) { window.okubos.forEach(o => { if(camera.position.distanceTo(o.position)<=r) o.userData.hp -= dmg; }); };
    window.api_58_triggerSystemPanic = function() { camera.position.set(0,45,0); };
    window.api_59_registerMod = function(modName) { if(!window.activeMods.includes(modName)) { window.activeMods.push(modName); window.api_16_triggerAdvancement("file_load"); if(window.updateModPanelList) window.updateModPanelList(); } };
    window.api_60_getModList = function() { return window.activeMods; };
    window.api_61_setBlockColor = function(id, c) { if(window.blockRegistry[id]) window.blockRegistry[id].color = c; };

    const saveScreen = document.createElement('div');
    saveScreen.style = 'position:absolute; top:35%; left:35%; width:30%; background:rgba(8,12,24,0.96); border:1px solid #ffcc00; display:none; color:#fff; padding:15px; z-index:350; font-family:sans-serif; border-radius:6px; text-align:center;';
    saveScreen.innerHTML = `<h4 style="color:#ffcc00; margin:0 0 10px 0;">💾 セーブデータマネージャー</h4><button id="b-sv" style="width:45%; padding:8px; margin-right:5%; background:#2288ff; color:#fff; border:none; cursor:pointer;">セーブ</button><button id="b-ld" style="width:45%; padding:8px; background:#aa33ff; color:#fff; border:none; cursor:pointer;">ロード</button>`;
    document.body.appendChild(saveScreen);
    document.getElementById('b-sv').onclick = () => { localStorage.setItem('okubocraft_matrix_v3', JSON.stringify({blocks:Array.from(window.worldBlocks.entries()), pos:window.api_20_getPlayerPosition(), kills:window.okuboKills, score:window.gameScore})); window.api_16_triggerAdvancement("save_world"); alert("ワールドをセーブしました。"); };
    document.getElementById('b-ld').onclick = () => { const data = JSON.parse(localStorage.getItem('okubocraft_matrix_v3')); if(data) { window.api_5_clearAllBlocks(); data.blocks.forEach(([k,v])=>window.worldBlocks.set(k,v)); camera.position.copy(data.pos); window.okuboKills = data.kills; window.gameScore = data.score; loadChunks(); alert("セーブデータから完全復元しました。"); } };

    const advScreen = document.createElement('div');
    advScreen.style = 'position:absolute; top:25%; left:25%; width:50%; background:rgba(6,16,10,0.96); border:1px solid #4caf50; display:none; color:#fff; padding:20px; z-index:350; font-family:sans-serif; border-radius:6px; max-height:50%; overflow-y:auto;';
    document.body.appendChild(advScreen);

    window.addEventListener('keydown', (e) => {
        if(window.isDead) return;
        const key = e.key.toLowerCase();
        
        if (["1","2","3","4","5","6","7","8","9"].includes(e.key)) { window.selectedSlot = parseInt(e.key) - 1; window.updateHotbarUI(); }
        if (key === 'b') { window.isHudVisible = !window.isHudVisible; }
        if (key === 'l') { window.isSaveMenuOpen = !window.isSaveMenuOpen; saveScreen.style.display = window.isSaveMenuOpen?'block':'none'; if(window.isSaveMenuOpen) document.exitPointerLock(); else renderer.domElement.requestPointerLock(); }
        
        if (key === 'm') {
            window.modMenuState = (window.modMenuState + 1) % 3;
            if (window.modMenuState === 0) {
                modScreen.style.display = 'none'; renderer.domElement.requestPointerLock();
            } else if (window.modMenuState === 1) {
                document.exitPointerLock(); modScreen.style.display = 'block';
                modScreen.style.top = '20%'; modScreen.style.left = '25%'; modScreen.style.width = '50%'; modScreen.style.height = '60%';
                document.getElementById('mod-title').innerText = "⚙️ MODアドオン管理パネル (通常モード)";
                window.updateModPanelList();
            } else if (window.modMenuState === 2) {
                document.exitPointerLock(); modScreen.style.display = 'block';
                modScreen.style.top = '0px'; modScreen.style.left = '0px'; modScreen.style.width = '100%'; modScreen.style.height = '100%';
                document.getElementById('mod-title').innerText = "👑 ※拡張APIてんこ盛りシステム (全画面巨大パネルモード)";
                window.updateModPanelList();
            }
        }
        
        if (key === 'c') {
            window.isAdvOpen = !window.isAdvOpen; advScreen.style.display = window.isAdvOpen?'block':'none';
            advScreen.innerHTML = `<h3 style="color:#4caf50; text-align:center; margin-top:0;">🏆 実績一覧</h3>` + window.advancements.map(a=>`<div style="margin:5px; padding:8px; background:rgba(0,0,0,0.4); border-left:4px solid ${a.done?'#4caf50':'#555'}; color:${a.done?'#00ff66':'#ccc'}"><b>${a.name}</b> - ${a.desc}</div>`).join('');
            if(window.isAdvOpen) document.exitPointerLock(); else renderer.domElement.requestPointerLock();
        }
    });

    // ==========================================
    // 🗺️ 7. 完璧に色彩同期された30バイオームWorkerエンジン (タイポ修正完了版)
    // ==========================================
    const workerCode = `
        const biomeColors = [
            0x4a7c59, 0x7209b7, 0xe3c16f, 0x7a2020, 0x00ffcc, 0xffb7c5, 0x2d6a4f, 0x1d3557,
            0x3f51b5, 0x00bcd4, 0x4caf50, 0xff9800, 0x795548, 0x9e9e9e, 0x607d8b, 0xffeb3b,
            0xe91e63, 0x9c27b0, 0x03a9f4, 0x8bc34a, 0xcddc39, 0xffc107, 0xff5722, 0x111111,
            0x114b5f, 0x028090, 0xe7f5dc, 0xf45b69, 0x456990, 0x00a896
        ];
        const blockTypes = [0, 9, 5, 4, 3, 6, 1, 7, 8, 10, 11, 12, 13, 14, 0, 1];

        self.onmessage = function(e) {
            const { chunkX, chunkZ, chunkSize, cubeSize, patternType, bIdx } = e.data;
            const blocks = [];
            const startX = chunkX * chunkSize * cubeSize;
            const startZ = chunkZ * chunkSize * cubeSize;

            const groundColor = biomeColors[bIdx % 30];
            const primaryType = blockTypes[bIdx % 16];

            for (let x = 0; x < chunkSize; x++) {
                for (let z = 0; z < chunkSize; z++) {
                    const worldX = startX + x * cubeSize;
                    const worldZ = startZ + z * cubeSize;
                    
                    let amp = 6;
                    if (bIdx % 6 === 0) amp = 14; 
                    if (bIdx % 6 === 3) amp = 1;  

                    let h = Math.floor((Math.sin(worldX * 0.03) * Math.cos(worldZ * 0.03) * amp) + 5);
                    if (h < -2) h = -2;

                    for (let y = h - 4; y <= h; y++) {
                        blocks.push({ x: worldX, y: y * cubeSize, z: worldZ, type: y === h ? primaryType : 1, color: groundColor });
                    }

                    // 🏛️ 構造物の乱獲防止プレミアム生成ロジック
                    if (x === 8 && z === 8 && (Math.abs(chunkX * chunkZ) % 7 === 3)) {
                        if (bIdx % 2 === 0) {
                            for (let py = 1; py <= 6; py++) {
                                let w = 6 - py;
                                for (let px = -w; px <= w; px++) {
                                    for (let pz = -w; pz <= w; pz++) {
                                        blocks.push({ x: worldX + px*2, y: (h + py)*2, z: worldZ + pz*2, type: 5, color: 0xe3c16f });
                                    }
                                }
                            }
                        } else {
                            for (let by = 1; by <= 14; by++) {
                                for (let bx = -1; bx <= 1; bx++) {
                                    for (let bz = -1; bz <= 1; bz++) {
                                        blocks.push({ x: worldX + bx*2, y: (h + by)*2, z: worldZ + bz*2, type: 3, color: 0x00ffcc });
                                    }
                                }
                            }
                        }
                    }
                    blocks.push({ x: worldX, y: -10, z: worldZ, type: 7, color: 0x050810 });
                }
            }
            self.postMessage({ chunkX, chunkZ, blocks });
        };
    `;
    const blob = new Blob([workerCode], { type: 'application/javascript' });
    const chunkWorker = new Worker(URL.createObjectURL(blob));

    chunkWorker.onmessage = function(e) {
        e.data.blocks.forEach(b => { window.worldBlocks.set(`${b.x},${b.y},${b.z}`, { type: b.type, color: b.color }); });
        renderChunk(e.data.chunkX, e.data.chunkZ);
    };

    window.forceRenderChunkAt = function(bx, bz) { renderChunk(Math.floor((bx/2)/window.chunkSize), Math.floor((bz/2)/window.chunkSize)); };

    function loadChunks() {
        const cx = Math.floor((camera.position.x/window.cubeSize)/window.chunkSize);
        const cz = Math.floor((camera.position.z/window.cubeSize)/window.chunkSize);
        
        const bNames = [
            "平穏な大久保プレインズ", "結晶アメジスト台地", "黄金の大久保砂漠", "深紅の溶岩地帯", "サイバーネオン都市跡", 
            "桜の聖木林", "深淵の黒曜石クレーター", "天空の雲海結晶地", "プラズマコア発電コア区", "エンドエーテル魔境",
            "古代青銅の埋没遺跡", "ルビーの深層鉱山", "大久保バイオ肉塊巣窟", "エメラルド緑色大盆地", "アクアマリン深海棚",
            "サファイアの冷徹凍土", "トパーズの極光荒野", "オパールの七彩幻想郷", "黒鉄の要塞メガストラクチャ", "輝白の真珠海岸",
            "アンバー琥珀の原生林", "漆黒 of コール・マイン", "水銀の流動バレー", "古代王の砂岩ピラミッド", "ネオンストリート五番街",
            "浮遊するエーテル島群", "大久保ファクトリー実験区", "深緑のモス・ジャングル", "カオス・マダラ・ディストピア", "終わりの始まりの虚空"
        ];
        const bIdx = Math.abs(cx * 7 + cz * 13) % 30;
        window.currentBiomeName = window.biomePatternType === "madara" ? "混沌の斑グラウンド" : bNames[bIdx];

        const skyColors = [0x080c14, 0x140324, 0x241b02, 0x1f0202, 0x011712, 0x1f0f14, 0x030308, 0x1a2330];
        let sc = skyColors[bIdx % skyColors.length];
        scene.background.setHex(sc); if(scene.fog) scene.fog.color.setHex(sc);

        for (let x = -window.renderDistance; x <= window.renderDistance; x++) {
            for (let z = -window.renderDistance; z <= window.renderDistance; z++) {
                const key = `${cx+x},${cz+z}`;
                if (!window.chunkInstances.has(key)) {
                    window.chunkInstances.set(key, 'loading');
                    chunkWorker.postMessage({ chunkX: cx+x, chunkZ: cz+z, chunkSize: window.chunkSize, cubeSize: window.cubeSize, patternType: window.biomePatternType, bIdx: bIdx });
                }
            }
        }
    }

    function renderChunk(cx, cz) {
        const chunkKey = `${cx},${cz}`;
        if (Array.isArray(window.chunkInstances.get(chunkKey))) window.chunkInstances.get(chunkKey).forEach(m => scene.remove(m));
        
        const typedBlocks = Array.from({length: 16}, () => []);
        const startX = cx * window.chunkSize * window.cubeSize;
        const startZ = cz * window.chunkSize * window.cubeSize;

        for(let x=0; x<window.chunkSize; x++) {
            for(let z=0; z<window.chunkSize; z++) {
                for(let y=-5; y<45; y++) {
                    const bk = `${startX+x*2},${y*2},${startZ+z*2}`;
                    if(window.worldBlocks.has(bk)) { 
                        const t = window.worldBlocks.get(bk).type; 
                        if(t>=0 && t<16) typedBlocks[t].push(bk); 
                    }
                }
            }
        }
        
        const meshes = [];
        window.blockRegistry.forEach(b => {
            if(typedBlocks[b.id].length === 0) return;
            const im = new THREE.InstancedMesh(correctedCubeGeo, blockMaterials[b.id], typedBlocks[b.id].length);
            const dummy = new THREE.Object3D(); const col = new THREE.Color();
            typedBlocks[b.id].forEach((k, i) => { 
                const [bx, by, bz] = k.split(',').map(Number); dummy.position.set(bx, by, bz); dummy.updateMatrix(); im.setMatrixAt(i, dummy.matrix); 
                if(b.id === 0 || b.id === 1 || b.id === 5 || b.id === 3 || b.id === 4 || b.id === 6 || b.id === 9) { col.setHex(window.worldBlocks.get(k).color); im.setColorAt(i, col); }
            });
            scene.add(im); meshes.push(im);
        });
        window.chunkInstances.set(chunkKey, meshes);
    }

    // ==========================================
    // 👹 8. 大久保エネミーAIシステム
    // ==========================================
    window.spawnCustomOkubo = function(x, y, z, hp = 6, isBoss = false, size = 1.0) {
        const mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.7*size, 1.1*size, 3.4*size, 6), new THREE.MeshStandardMaterial({ color: isBoss?0xff1144:0xff00ff, roughness:0.3 }));
        mesh.position.set(x, y, z); mesh.userData = { hp: hp, velY: 0, isBoss: isBoss }; scene.add(mesh); window.okubos.push(mesh);
    };

    function updateOkubos() {
        if(window.isDead || window.okubosFrozen) return;
        if(window.okubos.length < 5 && Math.random() < 0.015) {
            window.spawnCustomOkubo(camera.position.x+(Math.random()-0.5)*45, 35, camera.position.z+(Math.random()-0.5)*45, window.okuboKills>=15?80:6, window.okuboKills>=15);
        }
        
        for(let i = window.okubos.length - 1; i >= 0; i--) {
            const o = window.okubos[i];
            if (o.position.y < -20) { o.position.y = 30; o.userData.velY = 0; }

            const pDir = new THREE.Vector3().subVectors(camera.position, o.position); pDir.y = 0; pDir.normalize();
            o.position.addScaledVector(pDir, 0.07 * window.okuboSpeedMultiplier);
            o.userData.velY -= 0.02; o.position.y += o.userData.velY;

            const obx = Math.round(o.position.x/2)*2, obz = Math.round(o.position.z/2)*2, oby = Math.round((o.position.y - 1.7)/2)*2;
            if (window.worldBlocks.has(`${obx},${oby},${obz}`)) { o.position.y = oby + 1 + 1.7; o.userData.velY = 0; }

            if(camera.position.distanceTo(o.position) < 2.2 && Math.random() < 0.04) window.api_14_damagePlayer(1);
            if(o.userData.hp <= 0) { 
                scene.remove(o); window.okubos.splice(i, 1); window.okuboKills++; window.gameScore += 250; 
                if(window.okuboKills===1) window.api_16_triggerAdvancement("kill_1"); 
                if(window.okuboKills===15) window.api_16_triggerAdvancement("kill_15");
                if(o.userData.isBoss) window.api_16_triggerAdvancement("boss_clear");
            }
        }
    }

    // ==========================================
    // 🏃 9. 精査完了：ガクガク防止AABB衝突物理
    // ==========================================
    function isCollidingAt(pos) {
        const r = window.playerRadius; const h = window.playerHeight;
        const minX = Math.floor((pos.x - r) / 2) * 2; const maxX = Math.ceil((pos.x + r) / 2) * 2;
        const minZ = Math.floor((pos.z - r) / 2) * 2; const maxZ = Math.ceil((pos.z + r) / 2) * 2;
        const minY = Math.floor((pos.y - h) / 2) * 2; const maxY = Math.ceil(pos.y / 2) * 2;

        for (let bx = minX; bx <= maxX; bx += 2) {
            for (let bz = minZ; bz <= maxZ; bz += 2) {
                for (let by = minY; by <= maxY; by += 2) {
                    if (window.worldBlocks.has(`${bx},${by},${bz}`)) {
                        if (pos.x + r > bx - 1 && pos.x - r < bx + 1 &&
                            pos.z + r > bz - 1 && pos.z - r < bz + 1 &&
                            pos.y > by - 1 && pos.y - h < by + 1) { return true; }
                    }
                }
            }
        }
        return false;
    }

    function updatePhysics() {
        if (window.isDead || window.isSaveMenuOpen || window.modMenuState > 0 || window.isAdvOpen) return;
        if (!window.isFlightEnabled) velocity.y -= window.gravity;

        let mult = window.lookInverted ? -1 : 1;
        const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); forward.y = 0; forward.normalize();
        const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); right.y = 0; right.normalize();
        let dir = new THREE.Vector3();
        if (window.keys?.w) dir.add(forward); if (window.keys?.s) dir.addScaledVector(forward, -1);
        if (window.keys?.a) dir.addScaledVector(right, -1); if (window.keys?.d) dir.add(right);
        dir.normalize().multiplyScalar(window.playerSpeed);
        velocity.x = dir.x + (velocity.x - dir.x) * 0.82; velocity.z = dir.z + (velocity.z - dir.z) * 0.82;

        camera.position.y += velocity.y; isGrounded = false;
        
        if (velocity.y <= 0) {
            const checkPos = camera.position.clone(); checkPos.y -= 0.05; 
            if (isCollidingAt(checkPos)) {
                const targetBY = Math.round((camera.position.y - window.playerHeight)/2)*2;
                const b = window.worldBlocks.get(`${Math.round(camera.position.x/2)*2},${targetBY},${Math.round(camera.position.z/2)*2}`);
                if (Math.abs(camera.position.y - (targetBY + 1 + window.playerHeight)) > 0.01) {
                    camera.position.y = targetBY + 1 + window.playerHeight;
                }
                velocity.y = 0; isGrounded = true;
                if (b && b.type === 2) { velocity.y = 1.1; isGrounded = false; window.api_16_triggerAdvancement("high_jump"); }
            }
        } else {
            if (isCollidingAt(camera.position)) { velocity.y = 0; }
        }

        let testPos = camera.position.clone(); testPos.x += velocity.x;
        if (!isCollidingAt(testPos)) { camera.position.x = testPos.x; } else { velocity.x = 0; }

        testPos.copy(camera.position); testPos.z += velocity.z;
        if (!isCollidingAt(testPos)) { camera.position.z = testPos.z; } else { velocity.z = 0; }

        if(camera.position.y < -8) { camera.position.y = -8; velocity.y = 0; isGrounded = true; }
        if (window.keys?.[' '] && isGrounded) { velocity.y = window.jumpPower; isGrounded = false; }
    }

    document.addEventListener('pointerlockchange', () => { isLocked = (document.pointerLockElement === renderer.domElement); });
    renderer.domElement.addEventListener('click', () => { if(!isLocked && !window.isSaveMenuOpen && window.modMenuState === 0 && !window.isAdvOpen) renderer.domElement.requestPointerLock(); });
    document.addEventListener('mousemove', (e) => { if (isLocked) { euler.y -= e.movementX * 0.0024; euler.x -= e.movementY * 0.0024; euler.x = Math.max(-1.42, Math.min(1.42, euler.x)); camera.quaternion.setFromEuler(euler); } });
    
    window.keys = { w:false, a:false, s:false, d:false, ' ':false };
    window.addEventListener('keydown', (e) => { if(e.key.toLowerCase() in window.keys) window.keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { if(e.key.toLowerCase() in window.keys) window.keys[e.key.toLowerCase()] = false; });

    window.updateHotbarUI = function() { swordGroup.visible = (window.hotbarInventory[window.selectedSlot]?.id === 99); };

    function animate() {
        requestAnimationFrame(animate); updatePhysics(); updateOkubos(); loadChunks(); updateHUDData();
        if(isSwinging) { swingTimer += 0.28; swordGroup.rotation.y = Math.sin(swingTimer)*1.6; if(swingTimer>Math.PI){isSwinging=false; swordGroup.rotation.y=0;} }
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    window.api_16_triggerAdvancement("start"); animate();
})();

    </script>
